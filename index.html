<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رمز التحقق</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

.container {
    width: 320px;
    margin: 80px auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    margin-bottom: 10px;
}

p {
    color: #777;
    font-size: 14px;
}

.otp-inputs {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
}

.otp-inputs input {
    width: 45px;
    height: 50px;
    text-align: center;
    font-size: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #ff6a00;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:disabled {
    background: #ccc;
}

.resend {
    margin-top: 15px;
    font-size: 14px;
}

.resend a {
    color: #ff6a00;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>رمز التحقق</h2>
    <p>أدخل الرمز المرسل إلى رقمك</p>

    <div class="otp-inputs">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
    </div>

    <button id="verifyBtn" disabled>تأكيد</button>

    <div class="resend">
        لم يصلك الرمز؟ <a href="#">إعادة الإرسال</a>
    </div>
</div>

<script>
const inputs = document.querySelectorAll(".otp-inputs input");
const button = document.getElementById("verifyBtn");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        checkInputs();
    });
});

function checkInputs() {
    let filled = true;
    inputs.forEach(input => {
        if (input.value === "") filled = false;
    });
    button.disabled = !filled;
}
</script>

</body>
</html>
