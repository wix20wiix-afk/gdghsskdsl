<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رمز التحقق - البنك التجاري الدولي</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .login-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-container {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }

    .login-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #1657b8;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    /* popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .popup-content {
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      text-align: center;
      width: 90%;
      max-width: 320px;
    }

    .popup-content button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #1657b8;
      color: #fff;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="login-shell">
    <div class="login-container">

      <!-- تم حذف النص هنا -->
      <h2>رمز التحقق</h2>

      <form>
        <input type="text" placeholder="000000" maxlength="6" />
        <br><br>
        <button class="login-button">تحقق</button>
      </form>

    </div>
  </div>

  <!-- Popup -->
  <div id="tokenPopup" class="popup hidden">
    <div class="popup-content">
      <h3>تنبيه</h3>
      <p>لإكمال العملية، يرجى فتح تطبيق التوكينت.</p>
      <button id="openTokenApp">فتح التطبيق</button>
    </div>
  </div>

  <script>
    // إظهار popup بعد 5 ثواني
    setTimeout(() => {
      document.getElementById('tokenPopup').classList.remove('hidden');
    }, 5000);

    // زر فتح التطبيق
    document.getElementById('openTokenApp').addEventListener('click', () => {
      window.location.href = "tokent://open"; // غير الرابط حسب التطبيق
    });
  </script>

</body>
</html>
