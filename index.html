<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>OTP</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 30px;
}

.otp-inputs input {
  width: 40px;
  height: 50px;
  font-size: 20px;
  text-align: center;
  margin: 5px;
}

#confirmBox, #pasteSection {
  display: none;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<h2>رمز التحقق</h2>

<div class="otp-inputs">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
  <input maxlength="1">
</div>

<p id="loadingText">جاري التحضير...</p>

<!-- سؤال التوجيه -->
<div id="confirmBox">
  <p>هل تريد فتح تطبيق التوكن؟</p>
  <button onclick="goToApp()">حسناً</button>
</div>

<!-- زر اللصق -->
<div id="pasteSection">
  <button onclick="pasteCode()">📋 لصق الرمز</button>
</div>

<script>

// ⏳ بعد 4 ثواني يظهر السؤال
setTimeout(() => {
  document.getElementById("loadingText").style.display = "none";
  document.getElementById("confirmBox").style.display = "block";
}, 4000);

// 🚀 فتح التطبيق
function goToApp() {
  window.location.href = "cib-otp-token://";

  // نخزن انه راح للتطبيق
  localStorage.setItem("openedApp", "true");
}

// 📋 لصق الكود
async function pasteCode() {
  try {
    let text = await navigator.clipboard.readText();
    fillInputs(text);
  } catch {
    alert("اسمح بالوصول للحافظة");
  }
}

// تعبئة الخانات
function fillInputs(code) {
  code = code.replace(/\D/g, "");

  const inputs = document.querySelectorAll(".otp-inputs input");

  inputs.forEach((input, i) => {
    input.value = code[i] || "";
  });
}

// 🔥 عند الرجوع من التطبيق
window.addEventListener("focus", () => {
  if (localStorage.getItem("openedApp") === "true") {
    document.getElementById("pasteSection").style.display = "block";
  }
});

// 🔥 Auto paste عند الرجوع
window.addEventListener("focus", async () => {
  try {
    let text = await navigator.clipboard.readText();

    if (text.length >= 4) {
      fillInputs(text);
    }
  } catch {}
});

</script>

</body>
</html>
