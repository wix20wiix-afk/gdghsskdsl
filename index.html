<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رمز التحقق</title>

<style>
body {
  font-family: Arial;
  background: #f9fafb;
  text-align: center;
  padding: 30px;
}

/* Loader */
#loader {
  margin-top: 80px;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #ddd;
  border-top: 5px solid #2563eb;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Box */
.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-top: 30px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* OTP */
.otp-inputs input {
  width: 45px;
  height: 55px;
  font-size: 20px;
  text-align: center;
  margin: 5px;
  border: 1px solid #ddd;
  border-radius: 10px;
}

/* Buttons */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  margin-top: 15px;
}

.primary {
  background: #2563eb;
  color: white;
}

.success {
  background: #16a34a;
  color: white;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<h2>رمز التحقق</h2>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
  <p>جاري التحضير...</p>
</div>

<!-- Step 1 -->
<div id="step1" class="card hidden">
  <p>لإكمال العملية، يرجى فتح تطبيق التوكن</p>
  <button class="primary" onclick="openApp()">فتح تطبيق التوكن</button>
</div>

<!-- Step 2 OTP -->
<div id="step2" class="card hidden">
  <p>أدخل رمز التحقق</p>

  <div class="otp-inputs">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
  </div>

  <button class="success" onclick="pasteCode()">📋 لصق الرمز</button>
</div>

<script>

// ⏳ Loader → Step1
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("step1").classList.remove("hidden");
}, 4000);

// 🚀 فتح التطبيق
function openApp() {
  localStorage.setItem("openedApp", "true");

  window.location.href = "cib-otp-token://";
}

// 📋 لصق الكود
async function pasteCode() {
  try {
    let text = await navigator.clipboard.readText();
    fillInputs(text);
  } catch {
    alert("اسمح بالوصول للحافظة");
  }
}

// تعبئة OTP
function fillInputs(code) {
  code = code.replace(/\D/g, "");

  const inputs = document.querySelectorAll(".otp-inputs input");

  inputs.forEach((input, i) => {
    input.value = code[i] || "";
  });
}

// 🔥 عند الرجوع من التطبيق
window.addEventListener("focus", async () => {

  if (localStorage.getItem("openedApp") === "true") {

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");

    // Auto paste
    try {
      let text = await navigator.clipboard.readText();

      if (text.length >= 4) {
        fillInputs(text);
      }
    } catch {}
  }
});

</script>

</body>
</html>
